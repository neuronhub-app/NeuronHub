[claude]
    run = """
        claude --dangerously-skip-permissions \
        --verbose \
        --thinking-display summarized \
        --append-system-prompt-file devops/agents/AGENTS-system-prompt-appendix.md \
        --settings devops/agents/settings.json
    """
    env = { TSC_CONFIG = "tsconfig.quiet.json" } # #prob-redundant
    interactive = true

["claude:med"]
    run = "mise claude --effort=medium"
    interactive = true

["claude:usage"]
    run = "mise claude '/usage'"
    interactive = true
