[claude]
    run = "claude --dangerously-skip-permissions --verbose --thinking-display summarized"
    env = { TSC_CONFIG = "tsconfig.quiet.json" } # #prob-redundant
    interactive = true

["claude:med"]
    run = "mise claude --effort=medium"
    interactive = true

["claude:usage"]
    run = "mise claude '/usage'"
    interactive = true
