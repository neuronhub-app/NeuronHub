# $schema: https://mise.jdx.dev/schema/mise-task.json

["docker:tag-and-push"]
    alias = "docker:push"
    usage = """
        flag "--app <name>" { choices "server" "client" "docs" "coder" }
        flag "--tag_only"
        flag "--pre_release"
    """
    dir = "devops/"
    run = """
        sudo -E python3 docker_tag_and_push.py \
            --app=($env.usage_app) \
            --vite_site="{{ env.VITE_SITE | default(value="") }}" \
            --django_env="{{ env.DJANGO_ENV | default(value="") }}" \
            --ghcr_repo="{{ env.GHCR_REPO }}" \
            --version="{{ env.VITE_RELEASE_VERSION }}" \
            ...(if $env.usage_pre_release? == "true" { ["--pre_release"] } else { [] })
    """

["docker:rm"]
    usage = """
        flag "--app <name>" { choices "server" "client" "docs" "coder" }
        flag "--version <version>" env="VITE_RELEASE_VERSION"
    """
    run = """
        let image_name = if $env.usage_app == "client" {
            let site_suffix = if ($env.VITE_SITE? | default "") != "" { $"-($env.VITE_SITE)" } else { "" }
            let stage_suffix = if ($env.DJANGO_ENV? | default "") == "stage" { "-stage" } else { "" }

            $"client($site_suffix)($stage_suffix)"
        } else {
            $env.usage_app
        }
        sudo -E docker rmi $"ghcr.io/{{ env.GHCR_REPO }}/($image_name):($env.usage_version)"
    """

["docker:build"]
    usage = """
        flag "--app <name>" { choices "server" "client" "docs" "coder" }
        flag "--version <version>" env="VITE_RELEASE_VERSION"
        flag "--no_cache" default=#false
    """
    # todo !! fix: in deploy.mdx explain: docker:build <-> Dockerfile <-> build_and_push <-> 2 env.ts files; + env prefixes re DJANGO_ and VITE_.
    description = """
        Build Docker by docker-compose temp file & inject envs as ARGS.

        If you alter envs -> alter Dockerfile ARGs + `build_and_push` CI task envs.
    """
    run = """
        # Sentry env.PROJECT_NAME mapping
        # ------------------------------------------------------------

        let sentry_project = if $env.usage_app == "client" {
          "{{ env.PROJECT_NAME }}-frontend"
        } else if $env.usage_app == "server" {
          "{{ env.PROJECT_NAME }}-backend"
        }

        # Force-pass Mise env & tag to the Docker build
        # ------------------------------------------------------------

        let image_name = if $env.usage_app == "client" {
            let site_suffix = if ($env.VITE_SITE? | default "") != "" { $"-($env.VITE_SITE)" } else { "" }
            let stage_suffix = if ($env.DJANGO_ENV? | default "") == "stage" { "-stage" } else { "" }

            $"client($site_suffix)($stage_suffix)"
        } else {
            $env.usage_app
        }

        let compose_file = $"docker-compose.build.($env.usage_app).yaml"
        let compose_content = $"
            services:
              ($env.usage_app):
                image: ghcr.io/{{ env.GHCR_REPO }}/($image_name):($env.usage_version)
                pull_policy: always
                platform: linux/amd64
                build:
                  context: (
                    match $env.usage_app {
                      "coder" => "devops/coder",
                      "server" => "server",

                      # pnpm root
                      "client" => ".",
                      "docs" => ".",
                    }
                  )
                  dockerfile: (
                    if $env.usage_app in ["coder", "server"] {
                      "Dockerfile"
                    } else {
                      $"($env.usage_app)/Dockerfile"
                    }
                  )
                  platforms:
                    - linux/amd64
                  args:
                    VITE_RELEASE_VERSION: ($env.usage_version)
                    GHCR_REPO: {{ env.GHCR_REPO }}

                    # for React Router build: Must match the {client|docs}/Dockerfile ARG names

                    VITE_ENV: {{ env.DJANGO_ENV | default(value="") }}
                    DJANGO_ENV: {{ env.DJANGO_ENV | default(value="") }}

                    VITE_SITE: {{ env.VITE_SITE | default(value="''") }}
                    VITE_GTM_ID: {{ env.VITE_GTM_ID | default(value="''") }}
                    VITE_SERVER_URL: https://{{ env.SERVER_DOMAIN }}
                    VITE_CLIENT_URL: {{ env.CLIENT_URL }}
                    VITE_ALGOLIA_APPLICATION_ID: {{ env.VITE_ALGOLIA_APPLICATION_ID }}
                    VITE_ALGOLIA_SEARCH_API_KEY: {{ env.VITE_ALGOLIA_SEARCH_API_KEY }}
                    VITE_ALGOLIA_INDEX_DOCS: {{ env.VITE_ALGOLIA_INDEX_DOCS }}

                    # for Sentry

                    PROJECT_NAME: {{ env.PROJECT_NAME }}
                    VITE_RELEASE_NAME: {{ env.VITE_RELEASE_NAME }}
                    SENTRY_AUTH_TOKEN: {{ env.SENTRY_AUTH_TOKEN | default(value="") }}
                    SENTRY_ORG: {{ env.SENTRY_ORG }}
                    SENTRY_PROJECT: ($sentry_project)
                    SENTRY_DSN_BACKEND: {{ env.SENTRY_DSN_BACKEND }}
                    SENTRY_DSN_FRONTEND: {{ env.SENTRY_DSN_FRONTEND }}
                    VITE_SENTRY_DSN_FRONTEND: {{ env.SENTRY_DSN_FRONTEND }}
"

        $compose_content | save --force $compose_file

        print $compose_content

        # Build
        # ------------------------------------------------------------

        let no_cache_flag = if $env.usage_no_cache == "true" { "--no-cache" } else { "" }

        if $env.CI? == "true" {
          nu -c $"docker compose --file ($compose_file) --progress=plain build ($no_cache_flag)"
        } else {
          let is_builder_missing = (do { sudo docker buildx inspect nhanative } | complete | get exit_code) != 0
          if $is_builder_missing {
            # eg on a macos vm to build for amd64 on arm
            sudo docker buildx create --name nhanative --driver docker-container --config devops/buildkitd-native.toml --bootstrap
          } else {
            nu -c $"sudo docker buildx bake --builder nhanative --file ($compose_file) --load --progress=plain ($no_cache_flag)"
          }
        }

        rm $compose_file
    """

