# $schema: https://mise.jdx.dev/schema/mise-task.json

["docker:tag-and-push"]
    alias = "docker:push"
    usage = """
        flag "--app <name>" { choices "server" "client" "docs" "coder" }
        flag "--tag_only"
        flag "--pre_release"
    """
    dir = "devops/"
    run = """
        sudo -E python3 docker_tag_and_push.py \
            --app=($env.usage_app) \
            --github_path="{{ env.GITHUB_PATH }}" \
            --version="{{ env.VITE_RELEASE_VERSION }}" \
            ...(if $env.usage_pre_release? == "true" { ["--pre_release"] } else { [] })
    """

["docker:rm"]
    usage = """
        flag "--app <name>" { choices "server" "client" "docs" "coder" }
        flag "--version <version>" env="VITE_RELEASE_VERSION"
    """
    run = "sudo -E docker rmi ghcr.io/{{ env.GITHUB_PATH }}/($env.usage_app):($env.usage_version)"

["docker:build"]
    usage = """
        flag "--app <name>" { choices "server" "client" "docs" "coder" }
        flag "--version <version>" env="VITE_RELEASE_VERSION"
        flag "--no_cache" default=#false
    """

    run = """
        # Sentry env.PROJECT_NAME mapping
        # ------------------------------------------------------------

        let sentry_project = if $env.usage_app == "client" {
          "{{ env.PROJECT_NAME }}-frontend"
        } else if $env.usage_app == "server" {
          "{{ env.PROJECT_NAME }}-backend"
        }

        mut server_domain = "{{ env.SERVER_DOMAIN }}"
        let server_prod_subdomain = "backend."
        let is_wrong_mise_env_loaded = false == ($server_prod_subdomain in $server_domain)
        if ($is_wrong_mise_env_loaded) {
          $server_domain = "backend.neuronhub.app"
        }

        # Force-pass Mise env & tag to the Docker build
        # ------------------------------------------------------------

        let compose_file = $"docker-compose.build.($env.usage_app).yaml"
        let compose_content = $"
            services:
              ($env.usage_app):
                image: ghcr.io/{{ env.GITHUB_PATH }}/($env.usage_app):($env.usage_version)
                pull_policy: always
                build:
                  context: (
                    match $env.usage_app {
                      "coder" => "devops/coder",
                      "server" => "server",

                      # pnpm root
                      "client" => ".",
                      "docs" => ".",
                    }
                  )
                  dockerfile: (
                    if $env.usage_app in ["coder", "server"] {
                      "Dockerfile"
                    } else {
                      $"($env.usage_app)/Dockerfile"
                    }
                  )
                  args:
                    VITE_RELEASE_VERSION: ($env.usage_version)

                    # for React Router build: Must match the {client|docs}/Dockerfile ARG names

                    VITE_ENV: {{ env.DJANGO_ENV }}
                    DJANGO_ENV: {{ env.DJANGO_ENV }}

                    VITE_SITE: {{ env.VITE_SITE | default(value="''") }}
                    VITE_GTM_ID: {{ env.VITE_GTM_ID | default(value="''") }}
                    VITE_SERVER_URL: https://($server_domain)
                    VITE_CLIENT_URL: {{ env.CLIENT_URL }}
                    VITE_ALGOLIA_APPLICATION_ID: {{ env.VITE_ALGOLIA_APPLICATION_ID }}
                    VITE_ALGOLIA_SEARCH_API_KEY: {{ env.VITE_ALGOLIA_SEARCH_API_KEY }}
                    VITE_ALGOLIA_INDEX_DOCS: {{ env.VITE_ALGOLIA_INDEX_DOCS }}

                    # for Sentry

                    PROJECT_NAME: {{ env.PROJECT_NAME }}
                    VITE_RELEASE_NAME: {{ env.VITE_RELEASE_NAME }}
                    SENTRY_AUTH_TOKEN: {{ env.SENTRY_AUTH_TOKEN }}
                    SENTRY_ORG: {{ env.SENTRY_ORG }}
                    SENTRY_PROJECT: ($sentry_project)
                    SENTRY_DSN_BACKEND: {{ env.SENTRY_DSN_BACKEND }}
                    SENTRY_DSN_FRONTEND: {{ env.SENTRY_DSN_FRONTEND }}
                    VITE_SENTRY_DSN_FRONTEND: {{ env.SENTRY_DSN_FRONTEND }}
"

        $compose_content | save --force $compose_file

        print $compose_content

        # Build
        # ------------------------------------------------------------

        # local needs `sudo -E`
        let docker_cmd = if $env.CI? == "true" { "docker" } else { "sudo -E docker" }

        if $env.usage_no_cache == "true" {
          nu -c $"($docker_cmd) compose --file ($compose_file) --progress=plain build --no-cache"
        } else {
          nu -c $"($docker_cmd) compose --file ($compose_file) --progress=plain build"
        }

        rm $compose_file
    """

["sentry:release"]
    description = "Link Git commits to Sentry Release & finalize"
    run = """
        npx @sentry/cli releases set-commits "{{ env.VITE_RELEASE_NAME }}" --auto --ignore-missing
        npx @sentry/cli releases finalize "{{ env.VITE_RELEASE_NAME }}"
    """

["docker:verify"]
    alias = "docker:test"
    usage = """
        flag "--app <name>" { choices "server" "client" }
        flag "--version <version>" env="VITE_RELEASE_VERSION"
    """
    run = """
        let image = $"ghcr.io/{{ env.GITHUB_PATH }}/($env.usage_app):($env.usage_version)"
        let name = $"verify-($env.usage_app)"

        # cleanup previous run
        sudo docker rm -f $name out+err> /dev/null

        if $env.usage_app == "client" {
          sudo docker run -d --name $name $image
          sleep 2sec

          let html = (sudo docker exec $name curl -sf http://localhost:3000)
          let has_noindex = ($html | str contains "noindex")
          print $"noindex: ($has_noindex) (if $has_noindex { '✓' } else { '✗ MISSING' })"

          let env_path = ($html | parse -r 'href="(/assets/env[^"]+\\.js)"' | get 0.capture0)
          let env_js = (sudo docker exec $name curl -sf $"http://localhost:3000($env_path)")
          let expected_env = "{{ env.DJANGO_ENV }}"
          let has_vite_env = ($env_js | str contains $'VITE_ENV:"($expected_env)"')
          print $"VITE_ENV=($expected_env): ($has_vite_env) (if $has_vite_env { '✓' } else { '✗ WRONG' })"

          sudo docker rm -f $name
        } else if $env.usage_app == "server" {
          sudo docker run -d --name $name $image sleep infinity

          let result = (sudo docker exec $name uv run manage.py shell -c "
from neuronhub.settings import DJANGO_ENV, IS_SENTRY_ENABLED
print(f'DJANGO_ENV={DJANGO_ENV.value} sentry={IS_SENTRY_ENABLED}')
")
          print $result

          sudo docker rm -f $name
        }
    """
