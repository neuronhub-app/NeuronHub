packages:
  - client
  - docs
  - packages/*
allowBuilds:
  esbuild: true
  '@sentry/cli': true
  core-js: false # runs an ad in postinstall
  protobufjs: false # never ran since ~2026.03.25

# v10 -> v11: asks to confirm purge of node_modules/ - skip for Mise non-TTY tasks.
confirmModulesPurge: false
