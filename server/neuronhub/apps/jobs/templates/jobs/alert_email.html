<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; padding:0; background-color:#eef2f7; font-family:Arial, sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#eef2f7; padding:40px 20px;">
  <tr>
    <td align="center">
      <table
        width="600"
        cellpadding="0"
        cellspacing="0"
        style="background-color:#ffffff; border-radius:12px; border:1px solid #e2e8f0;"
      >
        <tr>
          <td style="padding:32px 40px;">

            <h2 style="margin:0 0 24px 0; font-size:20px; font-weight:bold; color:#1a202c;">Here are your new matches:</h2>

            {% for job in jobs %}
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:12px 16px;">
                    <a href="{{ client_url }}/jobs/{{ job.slug }}" style="color:#1a56db; text-decoration:none; font-size:16px;">{{ job.title }} | {{ job.org.name }}</a>
                  </td>
                </tr>
                <tr>
                  <td>
                    <hr style="border:none; border-top:1px solid #e2e8f0; margin:0;">
                  </td>
                </tr>
              </table>
            {% endfor %}

            {% if alert_job_filters %}
              <p style="margin:24px 0 4px 0; font-size:13px; color:#718096;">Your filters:</p>
              <ul style="margin:0; padding:0 0 0 20px; font-size:13px; color:#718096;">
                {% for line in alert_job_filters %}
                <li>{{ line }}</li>
                {% endfor %}
              </ul>
            {% endif %}

            <p style="margin:24px 0 0 0; font-size:14px; color:#4a5568;">
              Don't want to receive alerts? <a href="{{ client_url }}/jobs/subscriptions/remove/{{ alert.id_ext }}" style="color:#1a56db; text-decoration:underline;">Unsubscribe</a>.
            </p>

          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
