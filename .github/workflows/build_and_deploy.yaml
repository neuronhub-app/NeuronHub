name: "Deploy"
run-name: "Deploy ${{ inputs.target_deploy_env }} @ ${{ inputs.release_version }}"

on:
  workflow_dispatch:
    inputs:
      target_deploy_env:
        description: "Target deploy env"
        type: environment
        required: true
      release_version:
        description: "Release version (eg `0.3.6.0-rc.1`); becomes VITE_RELEASE_VERSION + image tag"
        type: string
        required: true

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_deploy_env }}
    permissions:
      packages: write
      contents: read
      id-token: write
      attestations: write
    env:
      REGISTRY: ghcr.io
      # ghcr.io rejects uppercase; `github.repository` keeps repo casing
      GHCR_REPO: neuronhub-app/neuronhub
      VITE_RELEASE_VERSION: ${{ inputs.release_version }}

      # env-scoped vars from the selected GH Environment
      DJANGO_ENV: ${{ vars.DJANGO_ENV }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      VITE_SITE: ${{ vars.VITE_SITE }}
      VITE_GTM_ID: ${{ vars.VITE_GTM_ID }}
      VITE_PROJECT_NAME: ${{ vars.VITE_PROJECT_NAME }}
      SERVER_DOMAIN: ${{ vars.SERVER_DOMAIN }}
      CLIENT_DOMAIN: ${{ vars.CLIENT_DOMAIN }}
      CLIENT_URL: ${{ vars.CLIENT_URL }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_DSN_BACKEND: ${{ vars.SENTRY_DSN_BACKEND }}
      SENTRY_DSN_FRONTEND: ${{ vars.SENTRY_DSN_FRONTEND }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      ALGOLIA_APPLICATION_ID: ${{ vars.ALGOLIA_APPLICATION_ID }}
      ALGOLIA_SEARCH_API_KEY: ${{ vars.ALGOLIA_SEARCH_API_KEY }}
      ALGOLIA_INDEX_DOCS: ${{ vars.ALGOLIA_INDEX_DOCS }}
      ALGOLIA_INDEX_POSTFIX_USER: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Mise
        uses: jdx/mise-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server+client images
        run: |
          mise run docker:build --app=server
          mise run docker:build --app=client
          mise run docker:tag-and-push --app=server --pre_release
          mise run docker:tag-and-push --app=client --pre_release

      - name: Get image digests
        id: digests
        shell: bash
        run: |
          # #AI-slop, the Git commit `a8efeea1` has nushell
          eval "$(mise env --shell bash)"
          server_digest=$(docker inspect "ghcr.io/${GHCR_REPO}/server:${VITE_RELEASE_VERSION}" --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)
          client_digest=$(docker inspect "ghcr.io/${GHCR_REPO}/client:${VITE_RELEASE_VERSION}" --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)
          echo "server=${server_digest}" >> "$GITHUB_OUTPUT"
          echo "client=${client_digest}" >> "$GITHUB_OUTPUT"

      - name: Attest server image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ env.GHCR_REPO }}/server
          subject-digest: ${{ steps.digests.outputs.server }}
          push-to-registry: true

      - name: Attest client image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ env.GHCR_REPO }}/client
          subject-digest: ${{ steps.digests.outputs.client }}
          push-to-registry: true
