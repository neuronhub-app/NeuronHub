name: "Deploy"
run-name: "Deploy ${{ inputs.target_deploy_env }} @ ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      target_deploy_env:
        description: "Target deploy env"
        type: environment
        required: true
      is_pre_release:
        description: "Pre-release (not 'latest' tag)"
        type: boolean

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_deploy_env }}
    permissions:
      packages: write
      contents: read
      id-token: write
      attestations: write
    env:
      REGISTRY: ghcr.io
      VITE_RELEASE_VERSION: ${{ github.ref_name }}

      DJANGO_ENV: ${{ vars.DJANGO_ENV }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      VITE_SITE: ${{ vars.VITE_SITE }}
      VITE_GTM_ID: ${{ vars.VITE_GTM_ID }}
      VITE_PROJECT_NAME: ${{ vars.VITE_PROJECT_NAME }}
      SERVER_DOMAIN: ${{ vars.SERVER_DOMAIN }}
      CLIENT_DOMAIN: ${{ vars.CLIENT_DOMAIN }}
      CLIENT_URL: ${{ vars.CLIENT_URL }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_DSN_BACKEND: ${{ vars.SENTRY_DSN_BACKEND }}
      SENTRY_DSN_FRONTEND: ${{ vars.SENTRY_DSN_FRONTEND }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      ALGOLIA_APPLICATION_ID: ${{ vars.ALGOLIA_APPLICATION_ID }}
      ALGOLIA_SEARCH_API_KEY: ${{ vars.ALGOLIA_SEARCH_API_KEY }}
      ALGOLIA_INDEX_DOCS: ${{ vars.ALGOLIA_INDEX_DOCS }}
      ALGOLIA_INDEX_POSTFIX_USER: ""

    steps:
      - name: Require a Tag ref (no branches)
        if: github.ref_type != 'tag'
        run: |
          echo "::error::Select a Tag, not a branch ('${{ github.ref_name }}' is a ${{ github.ref_type }})"
          exit 1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Mise
        uses: jdx/mise-action@v4

      # ghcr.io rejects uppercase paths (ie /NeuronHub)
      - name: Lowercase GHCR_REPO
        shell: nu {0}
        run: |
          let ghcr_repo = $env.GITHUB_REPOSITORY | str downcase
          $"GHCR_REPO=($ghcr_repo)\n" | save --append $env.GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server+client images
        env:
          PRE_RELEASE_FLAG: ${{ inputs.is_pre_release && '--pre_release' || '' }}
        run: |
          mise run docker:build --app=server
          mise run docker:build --app=client
          mise run docker:tag-and-push --app=server $PRE_RELEASE_FLAG
          mise run docker:tag-and-push --app=client $PRE_RELEASE_FLAG

      - name: Get image digests
        id: digests
        shell: nu {0}
        run: |

          def get_digest [image_name: string] {
            let image = $"ghcr.io/($env.GHCR_REPO)/($image_name):($env.VITE_RELEASE_VERSION)"

            let inspect = docker inspect $image | from json | first

            # `{registry/repo}@sha256:…` once per alias; all have the same digest -> first works.
            let repo_digest = $inspect.RepoDigests | first

            # keep `sha256:…` <- drop `{registry/repo}@` prefix
            $repo_digest | split row '@' | last
          }
          # Per `VITE_SITE` and `DJANGO_ENV` client image names, ie `-stage` and `-pg-stage` postfixes: 
          # todo ? refac: shorten to `if ($env.VITE_SITE?) {}` #AI-slop
          let site_postfix = if ($env.VITE_SITE? | default "") != "" { $"-($env.VITE_SITE)" } else { "" }
          let stage_postfix = if ($env.DJANGO_ENV? | default "") == "stage" { "-stage" } else { "" }
          let client_image_name = $"client($site_postfix)($stage_postfix)"

          let server_digest = get_digest "server"
          let client_digest = get_digest $client_image_name
          # todo ? refac: idk why client & client_image_name are 2 vars #AI-slop
          [
            $"server=($server_digest)"
            $"client=($client_digest)"
            $"client_image_name=($client_image_name)"
          ] | str join "\n" | save --append $env.GITHUB_OUTPUT

      - name: Attest server image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ env.GHCR_REPO }}/server
          subject-digest: ${{ steps.digests.outputs.server }}

      - name: Attest client image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ env.GHCR_REPO }}/${{ steps.digests.outputs.client_image_name }}
          subject-digest: ${{ steps.digests.outputs.client }}
